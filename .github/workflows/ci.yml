name: CI - Converter Jurídico

on:
  push:
    branches: [main]
    paths:
      - 'converter_md_project_v2/**'
  pull_request:
    branches: [main]
    paths:
      - 'converter_md_project_v2/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: converter_md_project_v2/requirements.txt

      - name: Install dependencies
        run: pip install -r converter_md_project_v2/requirements.txt

      - name: Run tests
        run: cd converter_md_project_v2 && python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: converter_md_project_v2/test-results.xml

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: >
          flake8 converter_md_project_v2/
          --max-line-length=120
          --exclude=__pycache__,.git
          --count
          --show-source
          --statistics

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t converter-juridico-test converter_md_project_v2/

      - name: Smoke test Docker image
        run: >
          docker run --rm --entrypoint python converter-juridico-test
          -c "from core.pipeline import convert_document; print('Import OK')"
