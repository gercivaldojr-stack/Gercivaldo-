# Configuração do Conversor Jurídico PDF → Markdown
# Copie este arquivo para config.yaml e ajuste conforme necessário.

# Modo de heurísticas: "forense" (peças processuais) ou "doutrina" (livros/artigos)
mode: "forense"

# Gerar sumário automático (TOC)
toc: false

# Separar peças processuais dentro do mesmo documento
separate: false

# Detectar citações jurisprudenciais como blockquote
detect_citations: true

# Extrair metadados expandidos (tipo_peca, paciente, etc.)
extract_metadata: false

# Extrair metadados processuais (autor, réu, comarca)
extract_procedural: false

# Separar itens enumerados com ; em lista Markdown
separate_enums: false

# Demarcar notas internas em blockquote
wrap_notes: false

# Remover cabeçalhos/rodapés repetidos (false = não remover)
no_hf: false

# Detectar layout de 2 colunas em PDFs (reordena na ordem de leitura)
detect_columns: true

# Formato de saída: "md" (Markdown), "html" (HTML com CSS jurídico), "docx" (Word)
output_format: "md"

# --- OCR ---
# Habilitar OCR seletivo (requer pytesseract + Tesseract instalado)
ocr: false

# Idioma do Tesseract (por = português, eng = inglês, auto = detectar)
# "auto" analisa stop words do texto nativo para detectar idioma
ocr_lang: "por"

# Mínimo de caracteres para considerar página com texto suficiente
# Páginas com menos chars que isso receberão OCR
ocr_threshold: 30

# Cache de OCR — salva resultados em disco para evitar re-processamento
ocr_cache: false
# Diretório do cache (null = ~/.cache/conversor-juridico/ocr)
# ocr_cache_dir: "/tmp/ocr-cache"

# --- Performance ---
# Páginas a processar, 1-based (null = todas). Página 1 = primeira página.
# Exemplos: "1-100", "1,5,10-50"
# pages: "1-100"

# Páginas por chunk para PDFs grandes (null = processar tudo de uma vez).
# Processa N páginas por vez, liberando memória entre chunks.
# Recomendado: 50-200 para PDFs com 500+ páginas em máquinas com pouca RAM.
# chunk_size: 100

# Workers para processamento paralelo.
# 0 ou null = sequencial (padrão). -1 = auto (detectar CPUs). N = fixo.
# Aplica-se a --batch e chunks de PDFs grandes.
# max_workers: 0
